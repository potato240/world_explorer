<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Explorer v10</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: sans-serif; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      color: white; z-index: 100; gap: 16px;
      overflow-y: auto; padding: 28px 16px;
    }
    #overlay h2 { font-size: 28px; font-weight: 900; }
    .cc-row { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .cc-row label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
    .swatches { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: white; transform: scale(1.2); }
    .cc-sections { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    #playBtn {
      margin-top: 4px; padding: 13px 44px; font-size: 16px; font-weight: bold;
      background: #27ae60; color: white; border: none; border-radius: 12px;
      cursor: pointer; box-shadow: 0 5px 0 #1a7a40;
    }
    #playBtn:hover { background: #2ecc71; }
    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 10; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 12px 22px; font-size: 14px; font-weight: bold;
      border: none; border-radius: 10px; cursor: pointer; color: white;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3); user-select: none;
    }
    #info {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: white;
      padding: 7px 16px; border-radius: 20px; font-size: 13px; pointer-events: none;
    }
    #status {
      position: fixed; top: 14px; right: 14px;
      background: rgba(0,0,0,0.45); color: #7fff7f;
      padding: 7px 12px; border-radius: 10px; font-size: 13px; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="overlay">
  <h2>World Explorer</h2>
  <div class="cc-sections">
    <div class="cc-row"><label>Skin</label><div class="swatches" id="sw-skin"></div></div>
    <div class="cc-row"><label>Shirt</label><div class="swatches" id="sw-shirt"></div></div>
    <div class="cc-row"><label>Shorts</label><div class="swatches" id="sw-shorts"></div></div>
    <div class="cc-row"><label>Hat Style</label><div class="swatches" id="sw-hattype"></div></div>
    <div class="cc-row"><label>Hat Color</label><div class="swatches" id="sw-hat"></div></div>
  </div>
  <button id="playBtn">Play</button>
  <p style="font-size:11px;opacity:0.4">ESC to return | WASD move | Space jump | E car | R ragdoll | 1-5 emotes</p>
</div>
<div id="info">WASD Move | E Enter/Exit Car | R Ragdoll</div>
<div id="status">On foot</div>
<div id="ui">
  <button class="btn" id="ragdollBtn" style="background:#e74c3c">Ragdoll</button>
  <button class="btn" id="carBtn" style="background:#2980b9">Enter Car</button>
  <button class="btn" id="slapBtn" style="background:#e67e22">👋 SLAP</button>
  <button class="btn emote-btn" data-emote="wave" style="background:#8e44ad">Wave</button>
  <button class="btn emote-btn" data-emote="dance" style="background:#16a085">Dance</button>
  <button class="btn emote-btn" data-emote="cheer" style="background:#d35400">Cheer</button>
  <button class="btn emote-btn" data-emote="spin" style="background:#c0392b">Spin</button>
  <button class="btn emote-btn" data-emote="sit" style="background:#2c3e50">Sit</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 220);
const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfffbe8, 0.9);
sun.position.set(60, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -120; sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120; sun.shadow.camera.bottom = -120;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 400;
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshLambertMaterial({ color: 0x5a8c4e })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Roads
const roadMat = new THREE.MeshLambertMaterial({ color: 0x3a3a3a });
const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
function makeRoad(x, z, w, h) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), roadMat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.01, z);
  scene.add(m);
}
for (let i = -200; i <= 200; i += 44) {
  makeRoad(i, 0, 9, 500);
  makeRoad(0, i, 500, 9);
}
for (let i = -200; i <= 200; i += 44) {
  for (let j = -200; j <= 200; j += 8) {
    const s1 = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 3.5), stripeMat);
    s1.rotation.x = -Math.PI / 2; s1.position.set(i, 0.02, j); scene.add(s1);
    const s2 = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 0.4), stripeMat);
    s2.rotation.x = -Math.PI / 2; s2.position.set(j, 0.02, i); scene.add(s2);
  }
}

// Buildings
const colliders = [];
const ladders = [];
const BCOLORS = [0xe74c3c,0x3498db,0x2ecc71,0xf39c12,0x9b59b6,0x1abc9c,0xe67e22,0xecf0f1,0xc0392b,0x2c3e50];
const sharedRailGeo = new THREE.BoxGeometry(0.07, 1, 0.07);
const sharedRailMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

function overlapsRoad(cx, cz, hw, hd) {
  const rHW = 5.5;
  for (let r = -200; r <= 200; r += 44) {
    if (cx - hw < r + rHW && cx + hw > r - rHW) return true;
    if (cz - hd < r + rHW && cz + hd > r - rHW) return true;
  }
  return false;
}

function checkColliders(x, z, radius, aboveY) {
  aboveY = aboveY || 0;
  for (var i = 0; i < colliders.length; i++) {
    var c = colliders[i];
    if (c.h && aboveY >= c.h) continue;
    if (Math.abs(x - c.x) < c.hw + radius && Math.abs(z - c.z) < c.hd + radius) return true;
  }
  return false;
}

function makeBuilding(cx, cz) {
  const bw = 6 + Math.random() * 8;
  const bh = 8 + Math.random() * 45;
  const bd = 6 + Math.random() * 8;
  if (overlapsRoad(cx, cz, bw / 2, bd / 2)) return;
  const col = BCOLORS[Math.floor(Math.random() * BCOLORS.length)];
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(bw, bh, bd),
    new THREE.MeshLambertMaterial({ color: col })
  );
  mesh.position.set(cx, bh / 2, cz);
  mesh.castShadow = true; mesh.receiveShadow = true;
  scene.add(mesh);
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(bw * 0.9, 0.6, bd * 0.9),
    new THREE.MeshLambertMaterial({ color: 0x555555 })
  );
  roof.position.set(cx, bh + 0.3, cz);
  scene.add(roof);
  colliders.push({ x: cx, z: cz, hw: bw / 2, hd: bd / 2, h: bh });
  // Ladder rails
  const lx = cx, lz = cz + bd / 2 + 0.05;
  [-0.22, 0.22].forEach(function(ox) {
    const rail = new THREE.Mesh(sharedRailGeo, sharedRailMat);
    rail.position.set(lx + ox, bh / 2, lz);
    rail.scale.y = bh;
    scene.add(rail);
  });
  ladders.push({ x: lx, z: lz, h: bh });
}

// Jump pads
const jumpPads = [];
const padBaseMat = new THREE.MeshLambertMaterial({ color: 0xffdd00 });
const padArrowMat = new THREE.MeshLambertMaterial({ color: 0xff6600 });
function makeJumpPad(x, z) {
  const base = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.2, 0.18, 16), padBaseMat);
  base.position.set(x, 0.09, z); scene.add(base);
  for (let i = 0; i < 3; i++) {
    const arrow = new THREE.Mesh(new THREE.ConeGeometry(0.45 - i * 0.05, 0.22, 3), padArrowMat);
    arrow.position.set(x, 0.22 + i * 0.22, z); arrow.rotation.y = Math.PI / 6; scene.add(arrow);
  }
  const ring = new THREE.Mesh(new THREE.TorusGeometry(1.05, 0.08, 8, 24), padArrowMat);
  ring.rotation.x = Math.PI / 2; ring.position.set(x, 0.2, z); scene.add(ring);
  jumpPads.push({ x: x, z: z, r: 1.1 });
}
[[15,0],[-15,0],[0,15],[0,-15],[44,44],[-44,44],[44,-44],[-44,-44],[88,0],[-88,0],[0,88],[0,-88],[44,0],[-44,0],[0,44],[0,-44]].forEach(function(p) { makeJumpPad(p[0], p[1]); });

// Character
function createPeakChar(skinColor, shirtColor, shortsColor) {
  const root = new THREE.Group();
  const skinMat = new THREE.MeshLambertMaterial({ color: skinColor });
  const shirtMat = new THREE.MeshLambertMaterial({ color: shirtColor });
  const shortsMat = new THREE.MeshLambertMaterial({ color: shortsColor });
  const shoeMat = new THREE.MeshLambertMaterial({ color: 0x4a2800 });
  const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 7, 6), skinMat);
  head.position.y = 1.88; head.castShadow = true; root.add(head);

  [-0.18, 0.18].forEach(function(ex) {
    const eyeRing = new THREE.Mesh(new THREE.CircleGeometry(0.13, 12), eyeMat);
    eyeRing.position.set(ex, 1.94, 0.46); root.add(eyeRing);
    const shine = new THREE.Mesh(new THREE.CircleGeometry(0.045, 8), whiteMat);
    shine.position.set(ex + 0.05, 1.97, 0.465); root.add(shine);
  });

  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.17, 0.18, 8), skinMat);
  neck.position.y = 1.46; root.add(neck);

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.72, 0.44), shirtMat);
  body.position.y = 1.05; body.castShadow = true; root.add(body);

  const hips = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.38, 0.42), shortsMat);
  hips.position.y = 0.62; hips.castShadow = true; root.add(hips);

  const hatMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const pomMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

  function mkExplorer() {
    const g = new THREE.Group();
    const cr = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.34, 0.32, 8), hatMat); cr.position.y = 2.54; g.add(cr);
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.06, 12), hatMat); br.position.y = 2.37; g.add(br);
    return g;
  }
  function mkBeanie() {
    const g = new THREE.Group();
    const b = new THREE.Mesh(new THREE.CylinderGeometry(0.33, 0.44, 0.4, 16), hatMat); b.position.y = 2.22; g.add(b);
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.47, 0.49, 0.1, 16), hatMat); br.position.y = 2.0; g.add(br);
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), pomMat); p.position.y = 2.46; g.add(p);
    return g;
  }
  function mkBaseball() {
    const g = new THREE.Group();
    const c = new THREE.Mesh(new THREE.SphereGeometry(0.46, 10, 6, 0, Math.PI*2, 0, Math.PI*0.55), hatMat); c.position.y = 2.08; g.add(c);
    const pk = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.06, 0.36), hatMat); pk.position.set(0, 1.98, 0.52); g.add(pk);
    return g;
  }
  function mkTophat() {
    const g = new THREE.Group();
    const cr = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.3, 0.72, 8), hatMat); cr.position.y = 2.62; g.add(cr);
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.06, 12), hatMat); br.position.y = 2.23; g.add(br);
    return g;
  }
  function mkHardhat() {
    const g = new THREE.Group();
    const d = new THREE.Mesh(new THREE.SphereGeometry(0.46, 10, 6, 0, Math.PI*2, 0, Math.PI*0.5), hatMat); d.position.y = 2.1; g.add(d);
    const l = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.05, 12), hatMat); l.position.y = 2.06; g.add(l);
    return g;
  }
  function mkCowboy() {
    const g = new THREE.Group();
    const cr = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.36, 0.36, 8), hatMat); cr.position.y = 2.56; g.add(cr);
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.78, 0.78, 0.05, 12), hatMat); br.position.y = 2.37; g.add(br);
    const dp = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.6), hatMat); dp.position.set(0, 2.33, 0.55); g.add(dp);
    return g;
  }

  const hats = { none: new THREE.Group(), explorer: mkExplorer(), beanie: mkBeanie(), baseball: mkBaseball(), tophat: mkTophat(), hardhat: mkHardhat(), cowboy: mkCowboy() };
  Object.entries(hats).forEach(function(kv) { kv[1].visible = kv[0] === 'explorer'; root.add(kv[1]); });

  function makeArm(side) {
    const shoulder = new THREE.Group();
    shoulder.position.set(side * 0.42, 1.35, 0);
    shoulder.rotation.z = side * 0.12;
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.105, 0.095, 0.5, 7), shirtMat);
    upper.position.y = -0.25; upper.castShadow = true; shoulder.add(upper);
    const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.1, 7, 6), skinMat);
    elbow.position.y = -0.52; shoulder.add(elbow);
    const forearm = new THREE.Group(); forearm.position.y = -0.52;
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.42, 7), skinMat);
    lower.position.y = -0.21; lower.castShadow = true; forearm.add(lower);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.115, 8, 7), skinMat);
    hand.scale.set(1.15, 0.9, 1.2); hand.position.y = -0.46; forearm.add(hand);
    shoulder.add(forearm); root.add(shoulder);
    return { shoulder: shoulder, forearm: forearm };
  }
  const armLP = makeArm(-1), armRP = makeArm(1);
  const armL = armLP.shoulder, armR = armRP.shoulder;

  function makeLeg(side) {
    const hip = new THREE.Group(); hip.position.set(side * 0.2, 0.44, 0);
    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, 0.42, 7), skinMat);
    thigh.position.y = -0.21; thigh.castShadow = true; hip.add(thigh);
    const kj = new THREE.Mesh(new THREE.SphereGeometry(0.115, 7, 6), skinMat);
    kj.position.y = -0.44; hip.add(kj);
    const knee = new THREE.Group(); knee.position.y = -0.44;
    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.1, 0.4, 7), skinMat);
    shin.position.y = -0.2; shin.castShadow = true; knee.add(shin);
    const boot = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.38), shoeMat);
    boot.position.set(0, -0.52, 0.06); knee.add(boot);
    hip.add(knee); root.add(hip);
    return { hip: hip, knee: knee };
  }
  const legLP = makeLeg(-1), legRP = makeLeg(1);
  const legL = legLP.hip, legR = legRP.hip;

  return { root: root, head: head, body: body, armL: armL, armR: armR, legL: legL, legR: legR, hats: hats, mats: { skinMat: skinMat, shirtMat: shirtMat, shortsMat: shortsMat, shoeMat: shoeMat, hatMat: hatMat } };
}

// Car
function createCar(col) {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshLambertMaterial({ color: col });
  const carBody = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.72, 4.4), bodyMat);
  carBody.position.y = 0.76; carBody.castShadow = true; g.add(carBody);
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.7, 2.3), bodyMat);
  cabin.position.set(0, 1.45, -0.15); cabin.castShadow = true; g.add(cabin);
  const wMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const hubMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
  const wheels = [];
  [[-1.18,0.4,1.4],[1.18,0.4,1.4],[-1.18,0.4,-1.4],[1.18,0.4,-1.4]].forEach(function(pos) {
    const wg = new THREE.Group(); wg.position.set(pos[0], pos[1], pos[2]);
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.28, 16), wMat);
    tire.rotation.z = Math.PI / 2; tire.castShadow = true; wg.add(tire);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.3, 8), hubMat);
    hub.rotation.z = Math.PI / 2; wg.add(hub);
    g.add(wg); wheels.push(wg);
  });
  return { group: g, wheels: wheels };
}

// Create character and car
const char = createPeakChar(0x5bcfcf, 0xff6b35, 0x4a7c3f);
char.root.position.set(0, 0, 2);
scene.add(char.root);
const carObj = createCar(0xff4444);
carObj.group.position.set(0, 0, -3);
scene.add(carObj.group);

// Flood button near spawn
const floodBtnGroup = new THREE.Group();
floodBtnGroup.position.set(-8, 0, 0);
const floodPed = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.0, 1.0), new THREE.MeshLambertMaterial({ color: 0x444444 }));
floodPed.position.y = 0.5; floodBtnGroup.add(floodPed);
const floodBtnMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.35, 0.6), new THREE.MeshLambertMaterial({ color: 0x0044ff }));
floodBtnMesh.position.y = 1.17; floodBtnGroup.add(floodBtnMesh);
scene.add(floodBtnGroup);
const floodLabel = document.createElement('div');

document.body.appendChild(floodLabel);

// Flood countdown UI
const floodUI = document.createElement('div');
floodUI.style.cssText = 'position:absolute;top:60px;left:50%;transform:translateX(-50%);color:#00cfff;font:bold 28px monospace;text-shadow:0 0 12px #00cfff,0 2px 4px #000;display:none;pointer-events:none';
document.body.appendChild(floodUI);

// Water mesh
const waterMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(1000, 1000),

waterMesh.rotation.x = -Math.PI / 2;

// Tsunami button near spawn
const tsunamiBtnGroup = new THREE.Group();
tsunamiBtnGroup.position.set(0, 0, -8);

tsunamiPed.position.y = 0.5; tsunamiBtnGroup.add(tsunamiPed);
const tsunamiBtnMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.35, 0.6), new THREE.MeshLambertMaterial({ color: 0x006688 }));

tsunamiUI.style.cssText = 'position:absolute;top:100px;left:50%;transform:translateX(-50%);color:#00eeff;font:bold 28px monospace;text-shadow:0 0 16px #00eeff,0 2px 4px #000;display:none;pointer-events:none';
document.body.appendChild(tsunamiUI);

// Tornado
const tornadoMesh = new THREE.Group();
const tFunnelMat = new THREE.MeshLambertMaterial({ color: 0x667755, transparent: true, opacity: 0.72, side: THREE.DoubleSide });
const tWidths = [0.3, 1.4, 3.2, 5.5, 8.2, 11.5, 15.0];
const tornadoSegs = [];
for (let i = 0; i < tWidths.length-1; i++) {
  const seg = new THREE.Mesh(new THREE.CylinderGeometry(tWidths[i+1], tWidths[i], 9, 11, 1, true), tFunnelMat);
  seg.position.y = i*9 + 4.5; tornadoMesh.add(seg); tornadoSegs.push(seg);
}
const tDustMat = new THREE.MeshLambertMaterial({ color: 0x998866, transparent: true, opacity: 0.55 });
const tDust = new THREE.Mesh(new THREE.CylinderGeometry(12, 1.5, 5, 12), tDustMat);
tDust.position.y = 2.5; tornadoMesh.add(tDust);
// Orbiting debris
const tornadoDebris = [];
const tDebrisMat = new THREE.MeshLambertMaterial({ color: 0x554433 });

function makeNPCPerson(x, z) {
  const skinPalette = [0xffddb4,0xf4c76a,0xc68642,0x8d5524,0xfde8c0,0xe8b89a];
  const shirtPalette = [0xe74c3c,0x3498db,0x2ecc71,0x9b59b6,0xf39c12,0xff69b4,0x1abc9c,0xe67e22,0x5bcfcf,0xff4444];
  const shortsPalette = [0x2c3e50,0x34495e,0x7f8c8d,0x1a5276,0x6c3483,0x1e8449,0x922b21,0x784212];
  const skin = skinPalette[Math.floor(Math.random()*skinPalette.length)];
  const shirt = shirtPalette[Math.floor(Math.random()*shirtPalette.length)];
  const shorts = shortsPalette[Math.floor(Math.random()*shortsPalette.length)];
  const c = createPeakChar(skin, shirt, shorts);
  c.root.position.set(x, 0, z);
  scene.add(c.root);
  return { group: c.root, char: c, vx: (Math.random()-0.5)*3, vz: (Math.random()-0.5)*3, timer: Math.random()*3, walk: 0,
    ragdoll: false, rvx: 0, rvy: 0, rvz: 0, rax: 0, ray: 0, raz: 0,
    limbVx: [0,0,0,0], limbVz: [0,0,0,0] };
}

function makeNPCCar(roadVal, axis) {
  const col = [0xffdd00,0x00aaff,0xff6600,0xaa00ff,0x00cc66,0xff3399][Math.floor(Math.random()*6)];
  const g = new THREE.Group();
  const bMat = new THREE.MeshLambertMaterial({ color: col });
  const b = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.6), bMat); b.position.y = 0.7; b.castShadow = true; g.add(b);
  const cab = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.55, 1.8), bMat); cab.position.set(0, 1.28, -0.1); g.add(cab);
  const wMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const wheels = [];
  [[-0.95,0.38,1.1],[0.95,0.38,1.1],[-0.95,0.38,-1.1],[0.95,0.38,-1.1]].forEach(function(p) {
    const wg = new THREE.Group(); wg.position.set(p[0],p[1],p[2]);
    const t = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.22,10), wMat); t.rotation.z = Math.PI/2; wg.add(t);
    g.add(wg); wheels.push(wg);
  });
  const spd = 6 + Math.random()*8;
  const dir = Math.random() > 0.5 ? 1 : -1;
  const lane = (dir > 0 ? 1.5 : -1.5) + (Math.random()-0.5)*0.5;
  if (axis === 'x') {
    g.position.set(dir>0 ? -180 : 180, 0, roadVal + lane);
    g.rotation.y = dir > 0 ? -Math.PI/2 : Math.PI/2;
  } else {
    g.position.set(roadVal + lane, 0, dir>0 ? -180 : 180);
    g.rotation.y = dir > 0 ? 0 : Math.PI;
  }
  scene.add(g);
  return { group: g, wheels: wheels, spd: spd * dir, axis: axis, road: roadVal };
}

function buildSwatches(id, colors, key) {
  const el = document.getElementById(id);
  if (!el) return;
  colors.forEach(function(col, i) {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = '#' + ('000000' + col.toString(16)).slice(-6);
    s.addEventListener('click', function(e) {
      e.stopPropagation();
      el.querySelectorAll('.swatch').forEach(function(x) { x.classList.remove('active'); });
      s.classList.add('active');
      charChoices[key] = col;
      const mk = key + 'Mat';
      if (char.mats[mk]) char.mats[mk].color.setHex(col);
    });
    el.appendChild(s);
  });
}

function buildHatTypes(id) {
  const el = document.getElementById(id);

  HAT_TYPES.forEach(function(type, i) {

// Controls
window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'KeyP' && !inCar) { isFirstPerson = !isFirstPerson; camPitch = 0; }
  if (e.code === 'KeyC' && !inCar && !isRagdoll) stance = stance === 1 ? 0 : 1; // toggle crouch
  if (e.code === 'KeyX' && !inCar && !isRagdoll) stance = stance === 2 ? 0 : 2; // toggle crawl
  if (e.code === 'KeyR') toggleRagdoll();
  if (e.code === 'KeyF') document.getElementById('slapBtn').click();
  if (e.code === 'KeyE') {
    const pp = char.root.position;
    const bx = pp.x - pvpBtnGroup.position.x, bz = pp.z - pvpBtnGroup.position.z;
    const fx = pp.x - floodBtnGroup.position.x, fz = pp.z - floodBtnGroup.position.z;
    const tx = pp.x - tsunamiBtnGroup.position.x, tz = pp.z - tsunamiBtnGroup.position.z;
    const mtx = pp.x - meteorBtnGroup.position.x, mtz = pp.z - meteorBtnGroup.position.z;
    const tnx = pp.x - tornadoBtnGroup.position.x, tnz = pp.z - tornadoBtnGroup.position.z;
    if (!isRagdoll && Math.sqrt(tx*tx+tz*tz) < 3.5) toggleTsunami();
    else if (!isRagdoll && Math.sqrt(fx*fx+fz*fz) < 3.5) toggleFlood();
    else if (!isRagdoll && Math.sqrt(bx*bx+bz*bz) < 3.5) togglePVP();
    else if (!isRagdoll && Math.sqrt(mtx*mtx+mtz*mtz) < 3.5) toggleMeteor();
    else if (!isRagdoll && Math.sqrt(tnx*tnx+tnz*tnz) < 3.5) toggleTornado();
    else tryEnterExit();
  }
  if (e.code === 'KeyQ') {
    if (heldNPC) {
      // Throw
      const throwDir = new THREE.Vector3(-Math.sin(camYaw), 0.4, -Math.cos(camYaw)).normalize();
      heldNPC.ragdoll = true;
      heldNPC.rvx = throwDir.x * 22; heldNPC.rvy = throwDir.y * 18 + 8; heldNPC.rvz = throwDir.z * 22;
      heldNPC.rax = (Math.random()-0.5)*16; heldNPC.ray = (Math.random()-0.5)*12; heldNPC.raz = (Math.random()-0.5)*16;
      heldNPC = null;
    } else if (!isRagdoll && !inCar) {
      // Pick up nearest NPC within 3 units
      const pp = char.root.position;
      let best = null, bestDist = 3.5;
      for (let i = 0; i < npcs.length; i++) {
        const n = npcs[i]; if (n.ragdoll) continue;
        const dx = n.group.position.x - pp.x, dz = n.group.position.z - pp.z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d < bestDist) { bestDist = d; best = n; }
      }
      if (best) { heldNPC = best; heldNPC.ragdoll = false; }
    }
  }
  const ek = { Digit1:'wave', Digit2:'dance', Digit3:'cheer', Digit4:'spin', Digit5:'sit' };
  if (ek[e.code] && !inCar && !isRagdoll) playEmote(ek[e.code]);
  if (e.code === 'Space' && onGround && !inCar && !isRagdoll) {
    playerVelY = 11; onGround = false; e.preventDefault();
  }
});

const _velVec = new THREE.Vector3();
const _upVec = new THREE.Vector3(0, 1, 0);
function spawnMeteor() {
  const size = 0.5 + Math.random() * 0.9;
  const vx = (Math.random()-0.5) * 55;
  const vy = -(85 + Math.random() * 55);
  const vz = (Math.random()-0.5) * 55;
  const g = new THREE.Group();
  g.position.set((Math.random()-0.5)*360, 220 + Math.random()*80, (Math.random()-0.5)*360);
  // orient trail behind velocity
  _velVec.set(vx, vy, vz).normalize().negate();
  g.quaternion.setFromUnitVectors(_upVec, _velVec);
  const rockMat = new THREE.MeshLambertMaterial({ color: 0xdd3300, emissive: 0xff2200 });
  const rock = new THREE.Mesh(new THREE.SphereGeometry(size, 7, 6), rockMat);
  g.add(rock);
  const trailMat = new THREE.MeshLambertMaterial({ color: 0xff7700, transparent: true, opacity: 0.55 });
  const trail = new THREE.Mesh(new THREE.ConeGeometry(size*0.55, size*12, 6), trailMat);
  trail.position.y = size*6;
  g.add(trail);
  scene.add(g);
  meteors.push({ group: g, vx, vy, vz, size, spin: (Math.random()-0.5)*4 });
}

function meteorImpact(x, y, z, size) {
  const r = size * 14;
  // Knockback player
  const pp = char.root.position;
  const dpx = pp.x-x, dpz = pp.z-z;
  const dp = Math.sqrt(dpx*dpx+dpz*dpz);
  if (dp < r && !inCar && !isRagdoll) {
    const f = ((r-dp)/r)*22+8;
    isRagdoll = true;
    rdVel.set(dp>0.1?dpx/dp*f:(Math.random()-0.5)*f, 14+f*0.4, dp>0.1?dpz/dp*f:(Math.random()-0.5)*f);
    rdAngVel.set((Math.random()-0.5)*14,(Math.random()-0.5)*10,(Math.random()-0.5)*14);
  }
  // Knockback NPCs
  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i]; if (n.ragdoll) continue;
    const dx = n.group.position.x-x, dz = n.group.position.z-z;
    const d = Math.sqrt(dx*dx+dz*dz);
    if (d < r) {
      const f = ((r-d)/r)*18+6;
      n.ragdoll = true;
      n.rvx = d>0.1?dx/d*f:(Math.random()-0.5)*f; n.rvy = 11+f*0.3; n.rvz = d>0.1?dz/d*f:(Math.random()-0.5)*f;
      n.rax = (Math.random()-0.5)*14; n.ray = (Math.random()-0.5)*10; n.raz = (Math.random()-0.5)*14;
    }
  }
  // Explosion flash
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(size*2.5, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0xff6600, emissive: 0xff4400, transparent: true, opacity: 0.92 })
  );
  flash.position.set(x, y+size, z);
  scene.add(flash);
  impacts.push({ mesh: flash, t: 0 });
}

function toggleTsunami() {
  if (tsunamiActive) {
    tsunamiActive = false; tsunamiCountdown = 0; tsunamiPeakTimer = -1;
    tsunamiWaveMoving = false; tsunamiWaveDone = false; tsunamiWaveZ = -420;
    tsunamiWaveMesh.visible = false;
    waterLevel = -0.5; waterMesh.position.y = -50; waterMesh.position.z = 0;
    tsunamiBtnMesh.material.color.setHex(0x006688);
    tsunamiUI.style.display = 'none';
    for (let i = 0; i < npcs.length; i++) { const n = npcs[i]; if (n.onRoof || n.onLadder) { n.onRoof = false; n.onLadder = false; n.descending = true; } else { n.floodTarget = null; } }
  } else {
    if (floodActive) return;
    tsunamiActive = true; tsunamiCountdown = 30;
    tsunamiWaveMoving = false; tsunamiWaveDone = false; tsunamiWaveZ = -420;
    tsunamiBtnMesh.material.color.setHex(0xff6600);
    tsunamiUI.style.display = 'block';
    for (let i = 0; i < npcs.length; i++) {
      const n = npcs[i];
      const nx = n.group.position.x, nz = n.group.position.z;
      let best = null, bestScore = -1;
      for (let k = 0; k < ladders.length; k++) {
        const l = ladders[k];
        if (l.h < 35) continue;
        const dx = l.x - nx, dz = l.z - nz;
        const score = l.h / (Math.sqrt(dx*dx+dz*dz) + 1);
        if (score > bestScore) { bestScore = score; best = l; }
      }
      n.floodTarget = best; n.onRoof = false; n.onLadder = false;
    }
  }
}

function toggleFlood() {
  if (floodActive) {
    floodActive = false; floodCountdown = 0; waterLevel = -0.5;
    waterMesh.position.y = -50;
    floodBtnMesh.material.color.setHex(0x0044ff);
    floodUI.style.display = 'none';
    // Reset NPC flood state
    for (let i = 0; i < npcs.length; i++) { const n = npcs[i]; if (n.onRoof || n.onLadder) { n.onRoof = false; n.onLadder = false; n.descending = true; } else { n.floodTarget = null; } }
  } else {
    floodActive = true; floodCountdown = 30;
    floodBtnMesh.material.color.setHex(0xff8800);
    floodUI.style.display = 'block';
    // Pre-assign each NPC the nearest tall ladder to flee to
    for (let i = 0; i < npcs.length; i++) {
      const n = npcs[i];
      const nx = n.group.position.x, nz = n.group.position.z;
      let best = null, bestScore = -1;
      for (let k = 0; k < ladders.length; k++) {
        const l = ladders[k];
        if (l.h < 10) continue;
        const dx = l.x - nx, dz = l.z - nz;
        const score = l.h / (Math.sqrt(dx*dx+dz*dz) + 1);
        if (score > bestScore) { bestScore = score; best = l; }
      }
      n.floodTarget = best; n.onRoof = false; n.onLadder = false;
    }
  }
}

function togglePVP() {
  pvpFrenzy = !pvpFrenzy;
  pvpBtnMesh.material.color.setHex(pvpFrenzy ? 0x00ff44 : 0xff2200);
  if (pvpFrenzy) {
    playerTeam = 0;
    for (let i = 0; i < npcs.length; i++) {
      const n = npcs[i];
      n.team = i % 2;
      n.frenzyHeld = null;
      n.frenzyTimer = Math.random() * 1.5;
      const markerMat = new THREE.MeshLambertMaterial({ color: n.team === 0 ? 0xff3300 : 0x0055ff });
      const marker = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 5), markerMat);
      marker.position.y = 2.35;
      n.teamMarker = marker;
      n.group.add(marker);
    }
  } else {
    for (let i = 0; i < npcs.length; i++) {
      const n = npcs[i];
      if (n.frenzyHeld) { n.frenzyHeld.isHeld = false; n.frenzyHeld = null; }
      n.isHeld = false;
      if (n.teamMarker) { n.group.remove(n.teamMarker); n.teamMarker = null; }
      n.team = -1;
    }
  }
}

function tryEnterExit() {
  if (isRagdoll) return;
  const cp = carObj.group.position, pp = char.root.position;
  const dist = Math.sqrt((cp.x-pp.x)*(cp.x-pp.x)+(cp.z-pp.z)*(cp.z-pp.z));
  if (!inCar && dist < 5) {
    inCar = true; char.root.visible = false; carVel = 0;
    status.textContent = 'Driving'; document.getElementById('carBtn').textContent = 'Exit Car';
  } else if (inCar) {
    inCar = false; char.root.visible = true;
    char.root.position.set(carObj.group.position.x + Math.cos(carAngle)*3, 0, carObj.group.position.z - Math.sin(carAngle)*3);
    status.textContent = 'On foot'; document.getElementById('carBtn').textContent = 'Enter Car';
  }
}

// Main loop
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (inCar) {
    const accel = 32, maxSpd = 55, friction = 0.9, turnSpd = 2.0;
    if (keys['KeyW'] || keys['ArrowUp']) carVel += accel * dt;
    if (keys['KeyS'] || keys['ArrowDown']) carVel -= accel * 0.7 * dt;
    if (Math.abs(carVel) > 0.5) {
      const dir = Math.sign(carVel);
      if (keys['KeyA'] || keys['ArrowLeft']) carAngle += turnSpd * dt * dir;
      if (keys['KeyD'] || keys['ArrowRight']) carAngle -= turnSpd * dt * dir;
    }
    carVel = Math.max(-maxSpd*0.55, Math.min(maxSpd, carVel)) * friction;
    const nx = carObj.group.position.x + Math.sin(carAngle) * carVel * dt;
    const nz = carObj.group.position.z + Math.cos(carAngle) * carVel * dt;
    if (!checkColliders(nx, carObj.group.position.z, 1.8)) carObj.group.position.x = nx;
    else carVel *= -0.25;
    if (!checkColliders(carObj.group.position.x, nz, 1.8)) carObj.group.position.z = nz;
    else carVel *= -0.25;
    carObj.group.rotation.y = carAngle;
    carObj.wheels.forEach(function(w) { w.rotation.x += carVel * dt * 1.6; });

  } else if (isRagdoll) {
    rdVel.y -= 22 * dt;
    const rdY = char.root.position.y;
    const nx = char.root.position.x + rdVel.x * dt;
    const nz = char.root.position.z + rdVel.z * dt;
    if (!checkColliders(nx, char.root.position.z, 0.45, rdY)) char.root.position.x = nx;
    else rdVel.x *= -0.4;
    if (!checkColliders(char.root.position.x, nz, 0.45, rdY)) char.root.position.z = nz;
    else rdVel.z *= -0.4;
    char.root.position.y += rdVel.y * dt;
    // Roof + ground landing
    if (rdVel.y < 0) {
      let rdFloor = 0;
      const rpx = char.root.position.x, rpz = char.root.position.z;
      for (let i = 0; i < colliders.length; i++) {
        const c = colliders[i];
        if (c.h && Math.abs(rpx-c.x)<c.hw && Math.abs(rpz-c.z)<c.hd) {
          rdFloor = Math.max(rdFloor, c.h);
        }
      }
      if (char.root.position.y < rdFloor) {
        char.root.position.y = rdFloor; rdVel.y = Math.abs(rdVel.y)*0.3;
        rdVel.x *= 0.65; rdVel.z *= 0.65; rdAngVel.multiplyScalar(0.6);
      }
    }
    if (char.root.position.y < 0) {
      char.root.position.y = 0; rdVel.y = Math.abs(rdVel.y)*0.3;
      rdVel.x *= 0.65; rdVel.z *= 0.65; rdAngVel.multiplyScalar(0.6);
    }
    char.root.rotation.x += rdAngVel.x*dt; char.root.rotation.y += rdAngVel.y*dt; char.root.rotation.z += rdAngVel.z*dt;
    const grav = 20, damp = 3.0;
    Object.entries(rdLimbs).forEach(function(kv) {
      const limb = kv[1], part = char[kv[0]];
      limb.angVel.x += (-grav*Math.sin(part.rotation.x)*0.35 - damp*limb.angVel.x)*dt;
      limb.angVel.z += (-grav*Math.sin(part.rotation.z)*0.2  - damp*limb.angVel.z)*dt;
      part.rotation.x += limb.angVel.x*dt; part.rotation.z += limb.angVel.z*dt;
    });
    rdAngVel.multiplyScalar(0.97);

  } else {
    // Stance smooth + stand on ragdoll recovery
    if (isRagdoll) stance = 0;
    const targetStanceY = stance === 2 ? -0.82 : stance === 1 ? -0.38 : 0;
    stanceY += (targetStanceY - stanceY) * Math.min(1, dt * 12);
    const sprinting = (keys['ShiftLeft'] || keys['ShiftRight']) && stance === 0 && onGround;
    const spd = stance === 2 ? 1.8 : stance === 1 ? 3.5 : sprinting ? 13 : 7;
    let mx = 0, mz = 0;
    const fwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
    const rgt = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
    if (keys['KeyW'] || keys['ArrowUp'])    { mx += fwd.x; mz += fwd.z; }
    if (keys['KeyS'] || keys['ArrowDown'])  { mx -= fwd.x; mz -= fwd.z; }
    if (keys['KeyA'] || keys['ArrowLeft'])  { mx -= rgt.x; mz -= rgt.z; }
    if (keys['KeyD'] || keys['ArrowRight']) { mx += rgt.x; mz += rgt.z; }
    const len = Math.sqrt(mx*mx + mz*mz);
    if (len > 0) {
      mx = mx/len*spd*dt; mz = mz/len*spd*dt;
      const py = char.root.position.y;
      if (!checkColliders(char.root.position.x+mx, char.root.position.z, 0.55, py)) char.root.position.x += mx;
      if (!checkColliders(char.root.position.x, char.root.position.z+mz, 0.55, py)) char.root.position.z += mz;
      char.root.rotation.y = Math.atan2(mx, mz);
      const cycleSpd = stance === 2 ? 5 : sprinting ? 15 : 9;
      walkCycle += dt*cycleSpd;
      const wv = Math.sin(walkCycle);
      if (stance === 2) { // crawl
        char.root.rotation.x = Math.PI*0.44;
        char.armL.rotation.x = -wv*1.1 - 1.0; char.armR.rotation.x = wv*1.1 - 1.0;
        char.legL.rotation.x = wv*1.1; char.legR.rotation.x = -wv*1.1;
        char.body.position.y = 1.08;
      } else if (stance === 1) { // crouch
        char.root.rotation.x = 0;
        char.armL.rotation.x = wv*0.5; char.armR.rotation.x = -wv*0.5;
        char.legL.rotation.x = -wv*0.6 + 0.9; char.legR.rotation.x = wv*0.6 + 0.9;
        char.body.position.y = 0.82;
      } else { // stand / sprint
        char.root.rotation.x = sprinting ? -0.18 : 0;
        char.armL.rotation.x = wv*(sprinting ? 1.1 : 0.7);
        char.legL.rotation.x = -wv*(sprinting ? 1.2 : 0.85); char.legR.rotation.x = wv*(sprinting ? 1.2 : 0.85);
        char.body.position.y = 1.08 + Math.abs(Math.sin(walkCycle*2))*0.04;
      }
      if (slapTime > 0) {
        char.armR.rotation.x = -Math.PI * 0.85 * Math.sin((1 - slapTime/0.5) * Math.PI);
        slapTime = Math.max(0, slapTime - dt);
      } else if (stance !== 1 && stance !== 2) {
        char.armR.rotation.x = -wv*(sprinting ? 1.1 : 0.7);
      }
    } else if (currentEmote) {
      emoteTime += dt; const t = emoteTime;
      if (currentEmote === 'wave') {
        char.armR.rotation.x = -Math.PI*0.7; char.armR.rotation.z = -0.15+Math.sin(t*10)*0.5;
        if (t>2.5) { currentEmote=null; resetPose(); }
      } else if (currentEmote === 'dance') {
        char.root.position.y = Math.max(0,Math.abs(Math.sin(t*6))*0.25);
        char.armL.rotation.x = Math.sin(t*6)*1.2; char.armR.rotation.x = -Math.sin(t*6)*1.2;
        char.armL.rotation.z = 0.3+Math.sin(t*6)*0.5; char.armR.rotation.z = -0.3-Math.sin(t*6)*0.5;
        char.legL.rotation.x = Math.sin(t*6)*0.4; char.legR.rotation.x = -Math.sin(t*6)*0.4;
        char.root.rotation.y += dt*Math.sin(t*3)*1.5;
        if (t>4) { currentEmote=null; resetPose(); }
      } else if (currentEmote === 'cheer') {
        const up = Math.abs(Math.sin(t*5));
        char.armL.rotation.x = -Math.PI*0.5-up*0.6; char.armR.rotation.x = -Math.PI*0.5-up*0.6;
        char.armL.rotation.z = 0.3+up*0.3; char.armR.rotation.z = -0.3-up*0.3;
        char.root.position.y = up*0.1;
        if (t>3) { currentEmote=null; resetPose(); }
      } else if (currentEmote === 'spin') {
        char.root.rotation.y += dt*8;
        if (isFirstPerson) camYaw -= dt*8;
        char.armL.rotation.z = Math.PI*0.5; char.armR.rotation.z = -Math.PI*0.5;
        if (t>1.6) { currentEmote=null; resetPose(); }
      } else if (currentEmote === 'sit') {
        char.legL.rotation.x = Math.PI*0.45; char.legR.rotation.x = Math.PI*0.45;
        char.armL.rotation.x = 0.3; char.armR.rotation.x = 0.3;
        char.root.position.y = -0.28;
        if (t>3) { currentEmote=null; resetPose(); }
      }
    } else {
      walkCycle += dt*1.5;
      if (stance === 2) { // crawl idle — stay flat
        char.root.rotation.x = Math.PI*0.44;
        char.armL.rotation.x += (-1.0 - char.armL.rotation.x)*dt*8;
        char.armR.rotation.x += (-1.0 - char.armR.rotation.x)*dt*8;
        char.legL.rotation.x *= 0.85; char.legR.rotation.x *= 0.85;
        char.body.position.y = 1.08;
      } else if (stance === 1) { // crouch idle
        char.root.rotation.x += (0 - char.root.rotation.x)*dt*10;
        char.armL.rotation.x *= 0.85;
        char.legL.rotation.x += (0.9 - char.legL.rotation.x)*dt*10;
        char.legR.rotation.x += (0.9 - char.legR.rotation.x)*dt*10;
        char.body.position.y = 0.82;
      } else { // stand idle
        char.root.rotation.x += (0 - char.root.rotation.x)*dt*10;
        char.armL.rotation.x *= 0.85;
        char.legL.rotation.x *= 0.85; char.legR.rotation.x *= 0.85;
        char.body.position.y = 1.08+Math.sin(walkCycle)*0.015;
      }
      if (slapTime > 0) {
        char.armR.rotation.x = -Math.PI * 0.85 * Math.sin((1 - slapTime/0.5) * Math.PI);
        slapTime = Math.max(0, slapTime - dt);
      } else {
        char.armR.rotation.x *= 0.85;
      }
    }

    // Depenetration — push player out if stuck inside a building
    const dpx = char.root.position.x, dpz = char.root.position.z, dpy = char.root.position.y;
    for (let i = 0; i < colliders.length; i++) {
      const c = colliders[i];
      if (dpy >= c.h) continue;
      const overX = c.hw + 0.55 - Math.abs(dpx - c.x);
      const overZ = c.hd + 0.55 - Math.abs(dpz - c.z);
      if (overX > 0 && overZ > 0) {
        if (overX < overZ) {
          char.root.position.x += dpx > c.x ? overX : -overX;
        } else {
          char.root.position.z += dpz > c.z ? overZ : -overZ;
        }
      }
    }

    // Ladder
    onLadder = false;
    for (let i = 0; i < ladders.length; i++) {
      const l = ladders[i];
      const dx = char.root.position.x - l.x, dz = char.root.position.z - l.z;
      if (dx*dx+dz*dz < 0.49 && char.root.position.y < l.h+0.5) { onLadder=true; ladderH=l.h; break; }
    }

    if (onLadder) {
      playerVelY = 0; onGround = false;
      if (keys['KeyW']||keys['ArrowUp'])   char.root.position.y = Math.min(ladderH, char.root.position.y+6*dt);
      if (keys['KeyS']||keys['ArrowDown']) char.root.position.y = Math.max(0, char.root.position.y-6*dt);
      walkCycle += dt*8;
      char.armL.rotation.x = Math.sin(walkCycle)*1.0; char.armR.rotation.x = -Math.sin(walkCycle)*1.0;
      char.legL.rotation.x = -Math.sin(walkCycle)*0.6; char.legR.rotation.x = Math.sin(walkCycle)*0.6;
    } else {
      playerVelY -= 28*dt;
      char.root.position.y += playerVelY*dt;
      let floorY = 0;
      const px = char.root.position.x, pz = char.root.position.z;
      if (playerVelY <= 0) {
        for (let i = 0; i < colliders.length; i++) {
          const c = colliders[i];
          if (c.h && Math.abs(px-c.x)<c.hw && Math.abs(pz-c.z)<c.hd) {
            floorY = Math.max(floorY, c.h);
          }
        }
      }
      if (char.root.position.y <= floorY) { char.root.position.y=floorY; playerVelY=0; onGround=true; }
      else if (floorY === 0 && char.root.position.y <= 0) { char.root.position.y=0; playerVelY=0; onGround=true; }
      else onGround = false;
      if (onGround) {
        for (let i = 0; i < jumpPads.length; i++) {
          const pad = jumpPads[i];
          const dx = char.root.position.x-pad.x, dz = char.root.position.z-pad.z;
          if (dx*dx+dz*dz < pad.r*pad.r) { playerVelY=58; onGround=false; break; }
        }
      }
    }
  }

  // NPC people
  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i];
    const nc = n.char;
    const limbs = [nc.armL, nc.armR, nc.legL, nc.legR];
    if (n.ragdoll) {
      n.rvy -= 22 * dt;
      const rnx = n.group.position.x + n.rvx*dt;
      const rnz = n.group.position.z + n.rvz*dt;
      if (!checkColliders(rnx, n.group.position.z, 0.4)) n.group.position.x = rnx; else n.rvx *= -0.4;
      if (!checkColliders(n.group.position.x, rnz, 0.4)) n.group.position.z = rnz; else n.rvz *= -0.4;
      n.group.position.y += n.rvy * dt;
      if (n.group.position.y < 0) {
        n.group.position.y = 0; n.rvy = Math.abs(n.rvy)*0.25;
        n.rvx *= 0.6; n.rvz *= 0.6; n.rax *= 0.6; n.raz *= 0.6;
        if (Math.abs(n.rvy) < 0.5 && Math.abs(n.rvx) < 0.3) {
          n.ragdoll = false;
          n.group.rotation.set(0, n.group.rotation.y, 0);
          nc.armL.rotation.set(0,0,0); nc.armR.rotation.set(0,0,0);
          nc.legL.rotation.set(0,0,0); nc.legR.rotation.set(0,0,0);
          nc.body.position.y = 1.08;
        }
      }
      n.group.rotation.x += n.rax*dt; n.group.rotation.y += n.ray*dt; n.group.rotation.z += n.raz*dt;
      n.rax *= 0.97; n.ray *= 0.97; n.raz *= 0.97;
      const grav = 18, damp = 3;
      for (let j = 0; j < 4; j++) {
        const limb = limbs[j];
        n.limbVx[j] += (-grav*Math.sin(limb.rotation.x)*0.3 - damp*n.limbVx[j])*dt;
        n.limbVz[j] += (-grav*Math.sin(limb.rotation.z)*0.2 - damp*n.limbVz[j])*dt;
        limb.rotation.x += n.limbVx[j]*dt; limb.rotation.z += n.limbVz[j]*dt;
      }
    } else {
      n.group.rotation.x *= 0.85; n.group.rotation.z *= 0.85;
      if (n.onRoof) {
        n.vx = 0; n.vz = 0;
        if (n.floodTarget) n.group.position.y = n.floodTarget.h;
        n.walk += dt*1.5;
        nc.armL.rotation.x *= 0.85; nc.armR.rotation.x *= 0.85;
        nc.legL.rotation.x *= 0.85; nc.legR.rotation.x *= 0.85;
      } else if (n.descending && n.floodTarget) {
        const l = n.floodTarget;
        const ddx = l.x - n.group.position.x, ddz = l.z - n.group.position.z;
        const dd = Math.sqrt(ddx*ddx+ddz*ddz);
        if (dd > 0.65) {
          n.vx = (ddx/dd)*5; n.vz = (ddz/dd)*5;
        } else {
          n.vx = 0; n.vz = 0;
          n.group.position.x = l.x; n.group.position.z = l.z;
          n.group.position.y = Math.max(0, n.group.position.y - 8*dt);
          if (n.group.position.y <= 0) { n.descending = false; n.floodTarget = null; }
        }
        n.walk += dt*6;
        const wv2 = Math.sin(n.walk);
        nc.armL.rotation.x = wv2*0.7; nc.armR.rotation.x = -wv2*0.7;
        nc.legL.rotation.x = -wv2*0.85; nc.legR.rotation.x = wv2*0.85;
        n.group.rotation.y = Math.atan2(n.vx || ddx, n.vz || ddz);
      } else if (pvpFrenzy) {
        // Find nearest enemy (NPC or player)
        let ex = 0, ez = 0, eDist = 999, enemyNPC = null, enemyIsPlayer = false;
        for (let j = 0; j < npcs.length; j++) {
          if (j === i || npcs[j].team === n.team || npcs[j].ragdoll) continue;
          const dx = npcs[j].group.position.x - n.group.position.x;
          const dz = npcs[j].group.position.z - n.group.position.z;
          const d = Math.sqrt(dx*dx+dz*dz);
          if (d < eDist) { eDist = d; ex = dx; ez = dz; enemyNPC = npcs[j]; }
        }
        if (!isRagdoll && playerTeam !== n.team) {
          const dx = char.root.position.x - n.group.position.x;
          const dz = char.root.position.z - n.group.position.z;
          const d = Math.sqrt(dx*dx+dz*dz);
          if (d < eDist) { eDist = d; ex = dx; ez = dz; enemyNPC = null; enemyIsPlayer = true; }
        }
        n.frenzyTimer = (n.frenzyTimer || 0) - dt;
        if (n.frenzyHeld) {
          // Carry held NPC, throw after delay
          n.frenzyHeld.group.position.set(n.group.position.x - Math.sin(n.group.rotation.y)*1.2, n.group.position.y+1.0, n.group.position.z - Math.cos(n.group.rotation.y)*1.2);
          n.frenzyHeld.group.rotation.set(0, n.group.rotation.y + Math.PI, 0);
          if (n.frenzyTimer <= 0) {
            const fh = n.frenzyHeld; n.frenzyHeld = null; fh.isHeld = false;
            fh.ragdoll = true;
            fh.rvx = -Math.sin(n.group.rotation.y)*20; fh.rvy = 10+Math.random()*4; fh.rvz = -Math.cos(n.group.rotation.y)*20;

      }
      if (!n.onRoof) {

        if (!n.descending) {
          if (Math.abs(n.group.position.x) > 190) n.vx *= -1;

          nc.body.position.y = 1.08 + Math.abs(Math.sin(n.walk*2))*0.04;
          n.group.rotation.y = Math.atan2(n.vx, n.vz);
        }
        if (n.group.position.y < 1) {
          const npx = n.group.position.x, npz = n.group.position.z;

            const c = colliders[k];
            const ox = c.hw + 0.4 - Math.abs(npx - c.x);

            if (ox > 0 && oz > 0) {

            }
          }

      }

  }

  // NPC cars
  for (let i = 0; i < npcCars.length; i++) {

    // Hit player

        rdVel.set(nd.x*force, 10+Math.random()*6, nd.z*force);

    }
    // Hit NPCs

  // Held NPC — carry in front of player
  if (heldNPC) {

  // Flood logic

    // NPC tsunami AI — run to ladder and climb
    for (let i = 0; i < npcs.length; i++) {

  if (tornadoActive) {

    if (pd < suctionR && !inCar) {

        isRagdoll = true;
        rdVel.set((Math.random()-0.5)*22, 26, (Math.random()-0.5)*22);
        rdAngVel.set((Math.random()-0.5)*18,(Math.random()-0.5)*14,(Math.random()-0.5)*18);

        rdVel.x += pdx/pd*pull*dt; rdVel.z += pdz/pd*pull*dt;
      } else {

      }
    }
    // NPCs
    for (let i = 0; i < npcs.length; i++) {
      const n = npcs[i];
      const dx = tornadoX-n.group.position.x, dz = tornadoZ-n.group.position.z;
      const d = Math.sqrt(dx*dx+dz*dz);
      if (d < suctionR) {

        }
      }

  }
  // Tornado button label
  const tnp = char.root.position;
  const tndx = tnp.x-tornadoBtnGroup.position.x, tndz = tnp.z-tornadoBtnGroup.position.z;
  if (Math.sqrt(tndx*tndx+tndz*tndz) < 3.5 && !isRagdoll) {
    tornadoBtnGroup.getWorldPosition(_v3); _v3.y += 1.8;
    const tnproj = _v3.clone().project(camera);
    const hw5 = renderer.domElement.clientWidth/2, hh5 = renderer.domElement.clientHeight/2;
    tornadoLabel.style.left = (tnproj.x*hw5+hw5-50)+'px';
    tornadoLabel.style.top  = (-tnproj.y*hh5+hh5-20)+'px';

    tornadoLabel.textContent = '[E] '+(tornadoActive?'STOP TORNADO':'TORNADO');

  // Meteor shower
  if (meteorActive) {

    if (meteorSpawnTimer <= 0) { meteorSpawnTimer = 0.08 + Math.random()*0.18; spawnMeteor(); }

  for (let i = meteors.length-1; i >= 0; i--) {
    const m = meteors[i];
    m.group.position.x += m.vx*dt;
    m.group.position.y += m.vy*dt;
    m.group.position.z += m.vz*dt;
    m.group.rotation.y += m.spin*dt;
    const mx = m.group.position.x, my = m.group.position.y, mz = m.group.position.z;
    let hitY = 0;
    for (let k = 0; k < colliders.length; k++) {

      if (Math.abs(mx-c.x) < c.hw+m.size && Math.abs(mz-c.z) < c.hd+m.size) hitY = Math.max(hitY, c.h||0);
    }
    if (my <= hitY+m.size || my <= m.size) {
      meteorImpact(mx, Math.max(hitY,0), mz, m.size);
      scene.remove(m.group); meteors.splice(i,1);
    } else if (Math.abs(mx)>400 || Math.abs(mz)>400 || my < -10) {

    meteorBtnGroup.getWorldPosition(_v3); _v3.y += 1.8;
    const meproj = _v3.clone().project(camera);
    const hw4 = renderer.domElement.clientWidth/2, hh4 = renderer.domElement.clientHeight/2;
    meteorLabel.style.left = (meproj.x*hw4+hw4-60)+'px';
    meteorLabel.style.top  = (-meproj.y*hh4+hh4-20)+'px';
    meteorLabel.style.display = 'block';
    meteorLabel.textContent = '[E] '+(meteorActive?'STOP METEORS':'METEOR SHOWER');
  } else { meteorLabel.style.display = 'none'; }

  // Tsunami button label
  const tp = char.root.position;
  const tdx = tp.x - tsunamiBtnGroup.position.x, tdz = tp.z - tsunamiBtnGroup.position.z;
  if (Math.sqrt(tdx*tdx+tdz*tdz) < 3.5 && !isRagdoll) {
    tsunamiBtnGroup.getWorldPosition(_v3);
    _v3.y += 1.8;
    const tproj = _v3.clone().project(camera);
    const hw3 = renderer.domElement.clientWidth/2, hh3 = renderer.domElement.clientHeight/2;
    tsunamiLabel.style.left = (tproj.x*hw3+hw3-55)+'px';
    tsunamiLabel.style.top  = (-tproj.y*hh3+hh3-20)+'px';
    tsunamiLabel.style.display = 'block';
    tsunamiLabel.textContent = '[E] ' + (tsunamiActive ? 'STOP TSUNAMI' : 'TSUNAMI');
  } else { tsunamiLabel.style.display = 'none'; }

  // PVP button label
  const bp = char.root.position;
  const bdx = bp.x - pvpBtnGroup.position.x, bdz = bp.z - pvpBtnGroup.position.z;
  if (Math.sqrt(bdx*bdx+bdz*bdz) < 3.5 && !isRagdoll) {
    pvpBtnGroup.getWorldPosition(_v3);
    _v3.y += 1.8;
    const proj = _v3.clone().project(camera);
    const hw = renderer.domElement.clientWidth/2, hh = renderer.domElement.clientHeight/2;
    pvpLabel.style.left = (proj.x*hw+hw-40)+'px';
    pvpLabel.style.top  = (-proj.y*hh+hh-20)+'px';
    pvpLabel.style.display = 'block';
    pvpLabel.textContent = '[E] ' + (pvpFrenzy ? 'STOP FRENZY' : 'PVP FRENZY');
  } else { pvpLabel.style.display = 'none'; }

  // Camera
  if (isFirstPerson && !inCar) {
    char.root.visible = false;
    if (isRagdoll) {
      // Track the character's tumbling head
      const headOff = new THREE.Vector3(0, 1.55, 0).applyEuler(char.root.rotation);
      const headPos = char.root.position.clone().add(headOff);
      const fwdDir = new THREE.Vector3(0, 0, 1).applyEuler(char.root.rotation);
      const upDir  = new THREE.Vector3(0, 1, 0).applyEuler(char.root.rotation);
      camera.up.copy(upDir);
      camera.position.copy(headPos);
      camera.lookAt(headPos.x + fwdDir.x*10, headPos.y + fwdDir.y*10, headPos.z + fwdDir.z*10);
      renderer.render(scene, camera);
    } else {
      camera.up.set(0, 1, 0);
      // Emote camera offsets
      let fpBobY = 0, fpRoll = 0, fpPitchOff = 0;
      if (currentEmote === 'dance') {
        fpBobY = Math.abs(Math.sin(emoteTime*6))*0.18;
        fpRoll = Math.sin(emoteTime*3)*0.09;
        fpPitchOff = Math.sin(emoteTime*6)*0.06;
      } else if (currentEmote === 'cheer') {
        fpBobY = Math.abs(Math.sin(emoteTime*5))*0.1;
        fpPitchOff = -Math.abs(Math.sin(emoteTime*5))*0.07;
      } else if (currentEmote === 'wave') {
        fpRoll = Math.sin(emoteTime*10)*0.04;
      } else if (currentEmote === 'sit') {
        fpBobY = -0.35;
      }
      const eyeY = char.root.position.y + 1.78 + stanceY + fpBobY;
      camera.position.set(char.root.position.x, eyeY, char.root.position.z);
      const pitch = camPitch + fpPitchOff;
      camera.lookAt(
        char.root.position.x - Math.sin(camYaw)*Math.cos(pitch)*10,
        eyeY + Math.sin(pitch)*10,
        char.root.position.z - Math.cos(camYaw)*Math.cos(pitch)*10
      );
      camera.rotation.z += fpRoll;
      // Sync viewmodel colours to chosen character colours
      vmSkinMat.color.copy(char.mats.skinMat.color);
      vmShirtMat.color.copy(char.mats.shirtMat.color);
      // Animate viewmodel arms
      const ws = Math.sin(walkCycle);
      vmLeftArm.position.set(-0.3 + ws*0.03, -0.42 + Math.abs(ws)*0.025, -0.58);
      vmRightArm.position.set(0.3 - ws*0.03, -0.42 + Math.abs(ws)*0.025, -0.58);
      vmLeftArm.rotation.x  =  ws*0.14;
      vmRightArm.rotation.x = -ws*0.14 + (slapTime>0 ? -Math.PI*0.75*Math.sin((1-slapTime/0.5)*Math.PI) : 0);
      vmLeftArm.rotation.z = 0; vmRightArm.rotation.z = 0;
      if (currentEmote === 'wave') {
        vmRightArm.rotation.x = -1.1 + Math.sin(emoteTime*10)*0.45;
        vmRightArm.position.y = -0.18;
      } else if (currentEmote === 'cheer') {
        vmLeftArm.rotation.x = -1.0 - Math.abs(Math.sin(emoteTime*5))*0.5;
        vmRightArm.rotation.x = -1.0 - Math.abs(Math.sin(emoteTime*5))*0.5;
        vmLeftArm.position.y = -0.2; vmRightArm.position.y = -0.2;
      } else if (currentEmote === 'dance') {
        vmLeftArm.rotation.x  =  Math.sin(emoteTime*6)*1.1;
        vmRightArm.rotation.x = -Math.sin(emoteTime*6)*1.1;
        vmLeftArm.rotation.z  =  0.3+Math.sin(emoteTime*6)*0.5;
        vmRightArm.rotation.z = -0.3-Math.sin(emoteTime*6)*0.5;
      }
      renderer.render(scene, camera);
      renderer.autoClear = false;
      renderer.clearDepth();
      renderer.render(vmScene, vmCamera);
      renderer.autoClear = true;
    }
  } else {
    camera.up.set(0, 1, 0);
    char.root.visible = !inCar;
    const focus = inCar ? carObj.group.position : char.root.position;
    _v3.set(focus.x+Math.sin(camYaw)*camDist, focus.y+camHeight, focus.z+Math.cos(camYaw)*camDist);
    camera.position.lerp(_v3, 0.12);
    camera.lookAt(focus.x, focus.y+1.2+stanceY, focus.z);
    renderer.render(scene, camera);
  }
}
animate();

// Load buildings + trees after UI is interactive
setTimeout(function() {
  for (let bx = -180; bx <= 180; bx += 44) {
    for (let bz = -180; bz <= 180; bz += 44) {
      [[bx+12,bz+12],[bx+28,bz+12],[bx+12,bz+28],[bx+28,bz+28]].forEach(function(q) {
        if (Math.abs(q[0])<25 && Math.abs(q[1])<25) return;
        if (Math.random() > 0.15) makeBuilding(q[0], q[1]);
      });
    }
  }
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b3f1f });
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x2d7a2d });
  for (let i = 0; i < 150; i++) {
    const tx = (Math.random()-0.5)*380, tz = (Math.random()-0.5)*380;
    if (checkColliders(tx, tz, 3) || overlapsRoad(tx, tz, 1.5, 1.5)) continue;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2, 6), trunkMat);
    trunk.position.set(tx, 1, tz); scene.add(trunk);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2+Math.random(), 7, 7), leafMat);
    leaves.position.set(tx, 3.2, tz); scene.add(leaves);
    colliders.push({ x: tx, z: tz, hw: 0.8, hd: 0.8 });
  }
}, 100);

window.addEventListener('resize', function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  vmCamera.aspect = innerWidth / innerHeight;
  vmCamera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
