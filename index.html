<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: sans-serif; }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 100; gap: 18px;
    }
    #overlay h2 { font-size: 30px; font-weight: 900; letter-spacing: 1px; }
    .cc-row { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cc-row label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
    .swatches { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .swatch {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: white; transform: scale(1.2); }
    .cc-sections { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
    #playBtn {
      margin-top: 6px; padding: 14px 48px; font-size: 17px; font-weight: bold;
      background: #27ae60; color: white; border: none; border-radius: 12px;
      cursor: pointer; box-shadow: 0 5px 0 #1a7a40;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #playBtn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #1a7a40; }
    #playBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1a7a40; }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .btn {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      box-shadow: 0 5px 0 rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
    #ragdollBtn { background: #e74c3c; }
    #carBtn { background: #2980b9; }
    #info {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
    }
    #status {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.45);
      color: #7fff7f;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="overlay">
  <h2>🌍 World Explorer</h2>
  <div class="cc-sections">
    <div class="cc-row">
      <label>Skin</label>
      <div class="swatches" id="sw-skin"></div>
    </div>
    <div class="cc-row">
      <label>Shirt</label>
      <div class="swatches" id="sw-shirt"></div>
    </div>
    <div class="cc-row">
      <label>Shorts</label>
      <div class="swatches" id="sw-shorts"></div>
    </div>
    <div class="cc-row">
      <label>Hat Style</label>
      <div class="swatches" id="sw-hattype"></div>
    </div>
    <div class="cc-row">
      <label>Hat Color</label>
      <div class="swatches" id="sw-hat"></div>
    </div>
  </div>
  <button id="playBtn">▶ Play</button>
  <p style="font-size:11px;opacity:0.4">Press ESC to return here &nbsp;|&nbsp; SPACE to jump</p>
</div>
<div id="info">WASD Move &nbsp;|&nbsp; E Enter/Exit Car &nbsp;|&nbsp; R Ragdoll</div>
<div id="status">On foot</div>
<div id="ui">
  <button class="btn" id="ragdollBtn">💀 Ragdoll</button>
  <button class="btn" id="carBtn">🚗 Enter Car</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 220);

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Lights ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfffbe8, 0.9);
sun.position.set(60, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
[-120, 120].forEach(v => {
  sun.shadow.camera.left = sun.shadow.camera.bottom = v;
  sun.shadow.camera.right = sun.shadow.camera.top = -v;
});
sun.shadow.camera.left = -120; sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120; sun.shadow.camera.bottom = -120;
scene.add(sun);

// ─── Ground ──────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshLambertMaterial({ color: 0x5a8c4e })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Roads ───────────────────────────────────────────────────────────────────
function makeRoad(x, z, w, h) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshLambertMaterial({ color: 0x3a3a3a })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.01, z);
  m.receiveShadow = true;
  scene.add(m);
}
for (let i = -200; i <= 200; i += 44) {
  makeRoad(i, 0, 9, 500);
  makeRoad(0, i, 500, 9);
}
// Pavement stripes
const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
for (let i = -200; i <= 200; i += 44) {
  for (let j = -200; j <= 200; j += 8) {
    const stripe = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 3.5), stripeMat);
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(i, 0.02, j);
    scene.add(stripe);
    const stripe2 = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 0.4), stripeMat);
    stripe2.rotation.x = -Math.PI / 2;
    stripe2.position.set(j, 0.02, i);
    scene.add(stripe2);
  }
}

// ─── Buildings ───────────────────────────────────────────────────────────────
const BCOLORS = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6, 0x1abc9c, 0xe67e22, 0xecf0f1, 0xc0392b, 0x2c3e50];
const colliders = []; // {x,z,hw,hd}

// Roads sit at every 44 units; this checks if a box overlaps any road (half-width 4.5 + 1 margin)
function overlapsRoad(cx, cz, hw, hd) {
  const rHW = 5.5;
  for (let r = -200; r <= 200; r += 44) {
    if (cx - hw < r + rHW && cx + hw > r - rHW) return true; // overlaps vertical road at x=r
    if (cz - hd < r + rHW && cz + hd > r - rHW) return true; // overlaps horizontal road at z=r
  }
  return false;
}

function makeBuilding(cx, cz) {
  const bw = 6 + Math.random() * 8;
  const bh = 8 + Math.random() * 45;
  const bd = 6 + Math.random() * 8;
  if (overlapsRoad(cx, cz, bw / 2, bd / 2)) return; // skip if it would sit on a road
  const col = BCOLORS[Math.floor(Math.random() * BCOLORS.length)];
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(bw, bh, bd),
    new THREE.MeshLambertMaterial({ color: col })
  );
  mesh.position.set(cx, bh / 2, cz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Roof detail
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(bw * 0.9, 0.6, bd * 0.9),
    new THREE.MeshLambertMaterial({ color: 0x555555 })
  );
  roof.position.set(cx, bh + 0.3, cz);
  scene.add(roof);

  // Windows
  const winMat = new THREE.MeshLambertMaterial({ color: 0xaaddff, transparent: true, opacity: 0.6 });
  const floors = Math.floor(bh / 3.5);
  const cols = Math.floor(bw / 2.5);
  for (let f = 0; f < floors; f++) {
    for (let c = 0; c < cols; c++) {
      const win = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.05), winMat);
      win.position.set(cx - bw/2 + 1.5 + c * 2.4, 2 + f * 3.5, cz + bd/2 + 0.01);
      scene.add(win);
    }
  }

  colliders.push({ x: cx, z: cz, hw: bw / 2, hd: bd / 2 });
}

for (let bx = -180; bx <= 180; bx += 44) {
  for (let bz = -180; bz <= 180; bz += 44) {
    const quads = [[bx+12,bz+12],[bx+28,bz+12],[bx+12,bz+28],[bx+28,bz+28]];
    for (const [qx, qz] of quads) {
      // skip buildings too close to the spawn area
      if (Math.abs(qx) < 25 && Math.abs(qz) < 25) continue;
      if (Math.random() > 0.15) makeBuilding(qx, qz);
    }
  }
}

// Trees
const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x6b3f1f });
const treeLeaveMat = new THREE.MeshLambertMaterial({ color: 0x2d7a2d });
for (let i = 0; i < 200; i++) {
  const tx = (Math.random() - 0.5) * 380;
  const tz = (Math.random() - 0.5) * 380;
  if (checkColliders(tx, tz, 3)) continue;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2, 6), treeTrunkMat);
  trunk.position.set(tx, 1, tz);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2 + Math.random(), 8, 8), treeLeaveMat);
  leaves.position.set(tx, 3.2, tz);
  leaves.castShadow = true;
  scene.add(leaves);
  colliders.push({ x: tx, z: tz, hw: 0.8, hd: 0.8 });
}

function checkColliders(x, z, radius) {
  for (const c of colliders) {
    if (Math.abs(x - c.x) < c.hw + radius && Math.abs(z - c.z) < c.hd + radius) return true;
  }
  return false;
}

// ─── PEAK-style Character ────────────────────────────────────────────────────
function createPeakChar(skinColor, shirtColor, shortsColor) {
  const root = new THREE.Group();

  const skinMat   = new THREE.MeshLambertMaterial({ color: skinColor });
  const shirtMat  = new THREE.MeshLambertMaterial({ color: shirtColor });
  const shortsMat = new THREE.MeshLambertMaterial({ color: shortsColor });
  const shoeMat   = new THREE.MeshLambertMaterial({ color: 0x4a2800 });
  const eyeMat    = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const whiteMat  = new THREE.MeshLambertMaterial({ color: 0xffffff });

  // ── Head: big round low-poly sphere ──
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 7, 6), skinMat);
  head.position.y = 1.88;
  head.castShadow = true;
  root.add(head);

  // Big round eyes (PEAK has large circular eyes, almost glasses-like)
  [-0.18, 0.18].forEach(ex => {
    const eyeRing = new THREE.Mesh(new THREE.CircleGeometry(0.13, 12), eyeMat);
    eyeRing.position.set(ex, 1.94, 0.46);
    root.add(eyeRing);
    const shine = new THREE.Mesh(new THREE.CircleGeometry(0.045, 8), whiteMat);
    shine.position.set(ex + 0.05, 1.97, 0.465);
    root.add(shine);
  });

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.17, 0.18, 8), skinMat);
  neck.position.y = 1.46;
  root.add(neck);

  // ── Torso: boxy shirt ──
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.72, 0.44), shirtMat);
  body.position.y = 1.05;
  body.castShadow = true;
  root.add(body);

  // ── Hips / shorts ──
  const hips = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.38, 0.42), shortsMat);
  hips.position.y = 0.62;
  hips.castShadow = true;
  root.add(hips);

  // ── Hats ──
  const hatMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const pomMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

  function makeHatExplorer() {
    const g = new THREE.Group();
    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.34, 0.32, 8), hatMat);
    crown.position.y = 2.54; g.add(crown);
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.06, 12), hatMat);
    brim.position.y = 2.37; g.add(brim);
    return g;
  }
  function makeHatBeanie() {
    const g = new THREE.Group();
    const body2 = new THREE.Mesh(new THREE.CylinderGeometry(0.33, 0.44, 0.4, 16), hatMat);
    body2.position.y = 2.22; g.add(body2);
    const brimB = new THREE.Mesh(new THREE.CylinderGeometry(0.47, 0.49, 0.1, 16), hatMat);
    brimB.position.y = 2.0; g.add(brimB);
    const pom = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), pomMat);
    pom.position.y = 2.46; g.add(pom);
    return g;
  }
  function makeHatBaseball() {
    const g = new THREE.Group();
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.46, 10, 6, 0, Math.PI*2, 0, Math.PI*0.55), hatMat);
    cap.position.y = 2.08; g.add(cap);
    const peak = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.06, 0.36), hatMat);
    peak.position.set(0, 1.98, 0.52); g.add(peak);
    return g;
  }
  function makeHatTopHat() {
    const g = new THREE.Group();
    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.3, 0.72, 8), hatMat);
    crown.position.y = 2.62; g.add(crown);
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.06, 12), hatMat);
    brim.position.y = 2.23; g.add(brim);
    return g;
  }
  function makeHatHardhat() {
    const g = new THREE.Group();
    const dome = new THREE.Mesh(new THREE.SphereGeometry(0.46, 10, 6, 0, Math.PI*2, 0, Math.PI*0.5), hatMat);
    dome.position.y = 2.1; g.add(dome);
    const lip = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.05, 12), hatMat);
    lip.position.y = 2.06; g.add(lip);
    return g;
  }
  function makeHatCowboy() {
    const g = new THREE.Group();
    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.36, 0.36, 8), hatMat);
    crown.position.y = 2.56; g.add(crown);
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.78, 0.78, 0.05, 12), hatMat);
    brim.position.y = 2.37; g.add(brim);
    // brim curve (front/back dip)
    const dip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.6), hatMat);
    dip.position.set(0, 2.33, 0.55); g.add(dip);
    return g;
  }

  const hats = {
    none:     new THREE.Group(),
    explorer: makeHatExplorer(),
    beanie:   makeHatBeanie(),
    baseball: makeHatBaseball(),
    tophat:   makeHatTopHat(),
    hardhat:  makeHatHardhat(),
    cowboy:   makeHatCowboy(),
  };
  Object.entries(hats).forEach(([k, g]) => { g.visible = k === 'explorer'; root.add(g); });

  // ── Arms: hang straight at sides, upper = shirt colour, lower = skin ──
  function makeArm(side) {
    const shoulder = new THREE.Group();
    // pivot at edge of torso, top of torso height
    shoulder.position.set(side * 0.42, 1.35, 0);
    shoulder.rotation.z = side * 0.12; // very slight outward lean

    // upper arm (shirt coloured)
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.105, 0.095, 0.5, 7), shirtMat);
    upper.position.y = -0.25;
    upper.castShadow = true;
    shoulder.add(upper);

    const elbowJoint = new THREE.Mesh(new THREE.SphereGeometry(0.1, 7, 6), skinMat);
    elbowJoint.position.y = -0.52;
    shoulder.add(elbowJoint);

    // forearm (skin)
    const forearm = new THREE.Group();
    forearm.position.y = -0.52;
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.42, 7), skinMat);
    lower.position.y = -0.21;
    lower.castShadow = true;
    forearm.add(lower);

    // round puffy hand
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.115, 8, 7), skinMat);
    hand.scale.set(1.15, 0.9, 1.2);
    hand.position.y = -0.46;
    forearm.add(hand);
    shoulder.add(forearm);

    root.add(shoulder);
    return { shoulder, forearm };
  }
  const armLParts = makeArm(-1);
  const armRParts = makeArm(1);
  const armL = armLParts.shoulder;
  const armR = armRParts.shoulder;

  // ── Legs: proper thigh + shin + boot ──
  function makeLeg(side) {
    const hip = new THREE.Group();
    hip.position.set(side * 0.2, 0.44, 0);

    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, 0.42, 7), skinMat);
    thigh.position.y = -0.21;
    thigh.castShadow = true;
    hip.add(thigh);

    const kneeJoint = new THREE.Mesh(new THREE.SphereGeometry(0.115, 7, 6), skinMat);
    kneeJoint.position.y = -0.44;
    hip.add(kneeJoint);

    const knee = new THREE.Group();
    knee.position.y = -0.44;
    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.1, 0.4, 7), skinMat);
    shin.position.y = -0.2;
    shin.castShadow = true;
    knee.add(shin);

    // Boot
    const boot = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.38), shoeMat);
    boot.position.set(0, -0.52, 0.06);
    knee.add(boot);

    hip.add(knee);
    root.add(hip);
    return { hip, knee };
  }
  const legLParts = makeLeg(-1);
  const legRParts = makeLeg(1);
  const legL = legLParts.hip;
  const legR = legRParts.hip;

  return { root, head, body, armL, armR, legL, legR, hats, mats: { skinMat, shirtMat, shortsMat, shoeMat, hatMat } };
}

const char = createPeakChar(0x5bcfcf, 0xff6b35, 0x4a7c3f);
char.root.position.set(0, 0, 2);
scene.add(char.root);

// ─── Car ─────────────────────────────────────────────────────────────────────
function createCar(col) {
  const g = new THREE.Group();

  // Main body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.72, 4.4),
    new THREE.MeshLambertMaterial({ color: col })
  );
  body.position.y = 0.76;
  body.castShadow = true;
  g.add(body);

  // Cabin
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 0.7, 2.3),
    new THREE.MeshLambertMaterial({ color: col })
  );
  cabin.position.set(0, 1.45, -0.15);
  cabin.castShadow = true;
  g.add(cabin);

  // Windows
  const winMat = new THREE.MeshLambertMaterial({ color: 0x99ccff, transparent: true, opacity: 0.65 });
  const fw = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.48, 0.05), winMat);
  fw.position.set(0, 1.5, 1.0);
  g.add(fw);
  const bw2 = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.48, 0.05), winMat);
  bw2.position.set(0, 1.5, -1.3);
  g.add(bw2);
  [-0.97, 0.97].forEach(sx => {
    const sw = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.44, 1.8), winMat);
    sw.position.set(sx, 1.5, -0.1);
    g.add(sw);
  });

  // Wheels
  const wheels = [];
  const wMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const hubMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
  [[-1.18, 0.4, 1.4],[1.18, 0.4, 1.4],[-1.18, 0.4, -1.4],[1.18, 0.4, -1.4]].forEach(([wx, wy, wz]) => {
    const wg = new THREE.Group();
    wg.position.set(wx, wy, wz);
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.28, 16), wMat);
    tire.rotation.z = Math.PI / 2;
    tire.castShadow = true;
    wg.add(tire);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.3, 8), hubMat);
    hub.rotation.z = Math.PI / 2;
    wg.add(hub);
    g.add(wg);
    wheels.push(wg);
  });

  // Headlights & taillights
  const hlMat = new THREE.MeshLambertMaterial({ color: 0xffffcc });
  const tlMat = new THREE.MeshLambertMaterial({ color: 0xff3300 });
  [-0.75, 0.75].forEach(sx => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.22, 0.08), hlMat);
    hl.position.set(sx, 0.82, 2.24);
    g.add(hl);
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.22, 0.08), tlMat);
    tl.position.set(sx, 0.82, -2.24);
    g.add(tl);
  });

  return { group: g, wheels };
}

const carObj = createCar(0xff4444);
carObj.group.position.set(0, 0, -3);
scene.add(carObj.group);

// ─── State ───────────────────────────────────────────────────────────────────
const keys = {};
let inCar = false;
let isRagdoll = false;
let walkCycle = 0;
let carVel = 0;
let carAngle = 0;
let playerVelY = 0;
let onGround = true;

// Ragdoll state
let rdVel = new THREE.Vector3();
let rdAngVel = new THREE.Vector3();
let rdTime = 0;
const rdLimbs = {
  armL: { angVel: new THREE.Vector3() },
  armR: { angVel: new THREE.Vector3() },
  legL: { angVel: new THREE.Vector3() },
  legR: { angVel: new THREE.Vector3() },
};

// Camera
let camYaw = 0;
const camDist = 9;
const camHeight = 4.5;

const status = document.getElementById('status');

// ─── Controls ────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR') toggleRagdoll();
  if (e.code === 'KeyE') tryEnterExit();
  if (e.code === 'Space' && onGround && !inCar && !isRagdoll) {
    playerVelY = 11;
    onGround = false;
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ─── Character Creator ───────────────────────────────────────────────────────
const SKIN_COLORS   = [
  0x5bcfcf,0x7ec8e3,0xa8e6a3,0xff9fb2,0xb39ddb,0xf9e04b,0xff8c69,0xff6eb4,
  0xe8a87c,0xf4c76a,0xc68642,0x8d5524,0x4a2800,0xfde8c0,0xffffff,0x222222,
  0x4fc3f7,0x81c784,0xce93d8,0xffb74d
];
const SHIRT_COLORS  = [0xff6b35,0x3498db,0xe74c3c,0x2ecc71,0x9b59b6,0xf39c12,0x1abc9c,0xe91e63,0xffffff,0x222222,0xff69b4,0x00bcd4];
const SHORTS_COLORS = [0x4a7c3f,0x2c3e50,0x8e44ad,0xd35400,0x16a085,0xc0392b,0x2980b9,0xf1c40f,0x7f8c8d,0x1a1a2e,0x880e4f,0x004d40];
const HAT_COLORS    = [0x8B6914,0xcc3333,0x2c3e50,0x27ae60,0x8e44ad,0xe67e22,0xecf0f1,0x222222,0x3498db,0xff69b4,0xff0000,0xf9e04b];
const HAT_TYPES     = ['none','explorer','beanie','baseball','tophat','hardhat','cowboy'];
const HAT_LABELS    = ['✕','🤠','🧢','🧢','🎩','⛑','🤠'];

const charChoices = { skin: SKIN_COLORS[0], shirt: SHIRT_COLORS[0], shorts: SHORTS_COLORS[0], hat: HAT_COLORS[0], hatType: 'explorer' };

function buildSwatches(containerId, colors, key) {
  const el = document.getElementById(containerId);
  colors.forEach((col, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = '#' + col.toString(16).padStart(6, '0');
    s.addEventListener('click', e => {
      e.stopPropagation();
      el.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      charChoices[key] = col;
      const matKey = key + 'Mat';
      if (char.mats[matKey]) char.mats[matKey].color.setHex(col);
    });
    el.appendChild(s);
  });
}

function buildHatTypes(containerId) {
  const el = document.getElementById(containerId);
  HAT_TYPES.forEach((type, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (type === 'explorer' ? ' active' : '');
    s.style.background = '#555';
    s.style.display = 'flex';
    s.style.alignItems = 'center';
    s.style.justifyContent = 'center';
    s.style.fontSize = '16px';
    s.style.borderRadius = '8px';
    s.textContent = HAT_LABELS[i];
    s.title = type;
    s.addEventListener('click', e => {
      e.stopPropagation();
      el.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      charChoices.hatType = type;
      Object.entries(char.hats).forEach(([k, g]) => g.visible = k === type);
    });
    el.appendChild(s);
  });
}

buildSwatches('sw-skin',   SKIN_COLORS,   'skin');
buildSwatches('sw-shirt',  SHIRT_COLORS,  'shirt');
buildSwatches('sw-shorts', SHORTS_COLORS, 'shorts');
buildSwatches('sw-hat',    HAT_COLORS,    'hat');
buildHatTypes('sw-hattype');

// Pointer lock
const overlay = document.getElementById('overlay');
document.getElementById('playBtn').addEventListener('click', e => {
  e.stopPropagation();
  renderer.domElement.requestPointerLock();
});
renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) {
    overlay.style.display = 'none';
  } else {
    overlay.style.display = 'flex';
  }
});
window.addEventListener('mousemove', e => {
  if (document.pointerLockElement === renderer.domElement) {
    camYaw -= e.movementX * 0.003;
  }
});

document.getElementById('ragdollBtn').addEventListener('click', toggleRagdoll);
document.getElementById('carBtn').addEventListener('click', tryEnterExit);

function toggleRagdoll() {
  if (inCar) return;
  isRagdoll = !isRagdoll;
  if (isRagdoll) {
    rdTime = 0;
    rdVel.set((Math.random() - 0.5) * 8, 5 + Math.random() * 4, (Math.random() - 0.5) * 8);
    rdAngVel.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 12);
    for (const limb of Object.values(rdLimbs)) {
      limb.angVel.set(
        (Math.random() - 0.5) * 18,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 10
      );
    }
    status.textContent = '💀 Ragdoll!';
  } else {
    resetPose();
    status.textContent = 'On foot';
  }
}

function resetPose() {
  char.root.rotation.set(0, char.root.rotation.y, 0);
  char.armL.rotation.set(0, 0, 0);
  char.armR.rotation.set(0, 0, 0);
  char.legL.rotation.set(0, 0, 0);
  char.legR.rotation.set(0, 0, 0);
}

function tryEnterExit() {
  if (isRagdoll) return;
  const cp = carObj.group.position;
  const pp = char.root.position;
  const dist = cp.distanceTo(new THREE.Vector3(pp.x, cp.y, pp.z));
  if (!inCar && dist < 5) {
    inCar = true;
    char.root.visible = false;
    carVel = 0;
    status.textContent = '🚗 Driving';
    document.getElementById('carBtn').textContent = '🚶 Exit Car';
  } else if (inCar) {
    inCar = false;
    char.root.visible = true;
    const exitDir = new THREE.Vector3(Math.cos(carAngle), 0, -Math.sin(carAngle));
    char.root.position.set(cp.x + exitDir.x * 3, 0, cp.z + exitDir.z * 3);
    status.textContent = 'On foot';
    document.getElementById('carBtn').textContent = '🚗 Enter Car';
  }
}

// ─── Main Loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const _v3 = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (inCar) {
    // ── Car driving ──
    const accel = 18, maxSpd = 28, friction = 0.88, turnSpd = 1.7;
    if (keys['KeyW'] || keys['ArrowUp'])   carVel += accel * dt;
    if (keys['KeyS'] || keys['ArrowDown']) carVel -= accel * 0.7 * dt;
    if (Math.abs(carVel) > 0.5) {
      const dir = Math.sign(carVel);
      if (keys['KeyA'] || keys['ArrowLeft'])  carAngle += turnSpd * dt * dir;
      if (keys['KeyD'] || keys['ArrowRight']) carAngle -= turnSpd * dt * dir;
    }
    carVel = Math.max(-maxSpd * 0.55, Math.min(maxSpd, carVel)) * friction;

    const nx = carObj.group.position.x + Math.sin(carAngle) * carVel * dt;
    const nz = carObj.group.position.z + Math.cos(carAngle) * carVel * dt;
    const hitX = checkColliders(nx, carObj.group.position.z, 1.8);
    const hitZ = checkColliders(carObj.group.position.x, nz, 1.8);
    if (!hitX) carObj.group.position.x = nx;
    if (!hitZ) carObj.group.position.z = nz;
    if (hitX || hitZ) carVel *= -0.25;
    carObj.group.rotation.y = carAngle;

    const spinAmt = carVel * dt * 1.6;
    carObj.wheels.forEach(w => w.rotation.x += spinAmt);

  } else if (isRagdoll) {
    // ── Ragdoll ──
    rdTime += dt;
    rdVel.y -= 22 * dt;
    char.root.position.x += rdVel.x * dt;
    char.root.position.y += rdVel.y * dt;
    char.root.position.z += rdVel.z * dt;

    if (char.root.position.y < 0) {
      char.root.position.y = 0;
      rdVel.y = Math.abs(rdVel.y) * 0.3;
      rdVel.x *= 0.65;
      rdVel.z *= 0.65;
      rdAngVel.multiplyScalar(0.6);
    }

    char.root.rotation.x += rdAngVel.x * dt;
    char.root.rotation.y += rdAngVel.y * dt;
    char.root.rotation.z += rdAngVel.z * dt;

    // Per-limb pendulum physics
    const grav = 20, damp = 3.0;
    for (const [name, limb] of Object.entries(rdLimbs)) {
      const part = char[name];
      // gravity torque pulls limb toward hanging position
      limb.angVel.x += (-grav * Math.sin(part.rotation.x) * 0.35 - damp * limb.angVel.x) * dt;
      limb.angVel.z += (-grav * Math.sin(part.rotation.z) * 0.2  - damp * limb.angVel.z) * dt;
      part.rotation.x += limb.angVel.x * dt;
      part.rotation.z += limb.angVel.z * dt;
    }

    rdAngVel.multiplyScalar(0.97);

  } else {
    // ── Walking ──
    const spd = 7;
    let mx = 0, mz = 0;
    const fwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
    const rgt = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));

    if (keys['KeyW'] || keys['ArrowUp'])    { mx += fwd.x; mz += fwd.z; }
    if (keys['KeyS'] || keys['ArrowDown'])  { mx -= fwd.x; mz -= fwd.z; }
    if (keys['KeyA'] || keys['ArrowLeft'])  { mx -= rgt.x; mz -= rgt.z; }
    if (keys['KeyD'] || keys['ArrowRight']) { mx += rgt.x; mz += rgt.z; }

    const len = Math.sqrt(mx*mx + mz*mz);
    if (len > 0) {
      mx = mx / len * spd * dt;
      mz = mz / len * spd * dt;
      const nx = char.root.position.x + mx;
      const nz = char.root.position.z + mz;
      if (!checkColliders(nx, char.root.position.z, 0.55)) char.root.position.x = nx;
      if (!checkColliders(char.root.position.x, nz, 0.55)) char.root.position.z = nz;
      char.root.rotation.y = Math.atan2(mx, mz);
      walkCycle += dt * 9;
      const wv = Math.sin(walkCycle);
      char.armL.rotation.x = wv * 0.7;
      char.armR.rotation.x = -wv * 0.7;
      char.legL.rotation.x = -wv * 0.85;
      char.legR.rotation.x = wv * 0.85;
      // Slight body bob
      char.body.position.y = 1.08 + Math.abs(Math.sin(walkCycle * 2)) * 0.04;
    } else {
      // Idle gentle sway
      walkCycle += dt * 1.5;
      char.armL.rotation.x *= 0.85;
      char.armR.rotation.x *= 0.85;
      char.legL.rotation.x *= 0.85;
      char.legR.rotation.x *= 0.85;
      char.body.position.y = 1.08 + Math.sin(walkCycle) * 0.015;
    }

    // Jump / gravity
    playerVelY -= 28 * dt;
    char.root.position.y += playerVelY * dt;
    if (char.root.position.y <= 0) {
      char.root.position.y = 0;
      playerVelY = 0;
      onGround = true;
    }
  }

  // ── Camera ──
  const focus = inCar ? carObj.group.position : char.root.position;
  const camX = focus.x + Math.sin(camYaw) * camDist;
  const camZ = focus.z + Math.cos(camYaw) * camDist;
  _v3.set(camX, focus.y + camHeight, camZ);
  camera.position.lerp(_v3, 0.12);
  camera.lookAt(focus.x, focus.y + 1.2, focus.z);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
